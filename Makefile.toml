# cargo-make shortcuts for the repository scripts.

[config]
min_version = "0.37.0"
default_to_workspace = false
skip_core_tasks = true

[tasks.dev]
description = "Build the local CLI and agent rootfs"
category = "Development"
script_runner = "bash"
script = ["./scripts/build.sh"]

[tasks.smolvm]
description = "Run the local smolvm build"
category = "Development"
script_runner = "bash"
script = [
'''
IFS=';' read -ra ARGS <<< "${CARGO_MAKE_TASK_ARGS}"
exec ./scripts/run.sh "${ARGS[@]}"
'''
]

# =============================================================================
# Build Tasks
# =============================================================================

[tasks.build]
description = "Build release binary"
category = "Build"
command = "cargo"
args = ["build", "--release"]

[tasks.build-agent]
description = "Build agent for Linux (size-optimized)"
category = "Build"
script_runner = "bash"
script = [
'''
if [ "$(uname -s)" = "Linux" ]; then
  cargo build --profile release-small -p smolvm-agent --target x86_64-unknown-linux-musl
else
  docker run --rm -v "$(pwd):/work" -w /work rust:alpine sh -c 'apk add musl-dev && cargo build --profile release-small -p smolvm-agent'
fi
'''
]

[tasks.dist]
description = "Build distribution package"
category = "Distribution"
script_runner = "bash"
script = [
'''
./scripts/build-dist.sh "$@"
'''
]

# =============================================================================
# Agent Tasks
# =============================================================================

[tasks.agent-rootfs]
description = "Build agent rootfs"
category = "Agent"
script_runner = "bash"
script = [
'''
./scripts/build-agent-rootfs.sh
'''
]

[tasks.agent-rebuild]
description = "Rebuild agent and update rootfs"
category = "Agent"
dependencies = ["build-agent", "agent-rootfs"]
script_runner = "bash"
script = [
'''
./scripts/rebuild-agent.sh
'''
]

# =============================================================================
# Test Tasks
# =============================================================================

[tasks.test]
description = "Run all feature suites (11 groups, ~10 min)"
category = "Test"
dependencies = ["test-lib"]
script_runner = "bash"
script = [
'''
./tests/run_tests.sh
'''
]

[tasks.test-cli]
description = "Run CLI tests only"
category = "Test"
script_runner = "bash"
script = [
'''
./tests/run_tests.sh cli
'''
]

[tasks.test-pack]
description = "Run pack tests only"
category = "Test"
script_runner = "bash"
script = [
'''
./tests/run_tests.sh pack
'''
]

[tasks.test-lib]
description = "Run unit tests (no VM required)"
category = "Test"
command = "cargo"
args = ["test", "--locked", "--lib"]

# =============================================================================
# Install Tasks
# =============================================================================

[tasks.install]
description = "Build from source and install locally"
category = "Install"
script_runner = "bash"
script = ["./scripts/install.sh"]

[tasks.uninstall]
description = "Remove the local install"
category = "Install"
script_runner = "bash"
script = ["./scripts/install.sh --uninstall"]

[tasks.runtime-libs]
description = "Build libkrunfw and libkrun from submodules"
category = "Build"
script_runner = "bash"
script = ["./scripts/build-runtime-libs.sh"]

[tasks.build-libkrunfw]
description = "Build libkrunfw from submodule and update lib/"
category = "Build"
script_runner = "bash"
script = ["./scripts/build-runtime-libs.sh libkrunfw"]

[tasks.build-libkrun]
description = "Build libkrun from submodule and update lib/"
category = "Build"
script_runner = "bash"
script = ["./scripts/build-runtime-libs.sh libkrun"]

[tasks.lint]
description = "Run format and clippy checks"
category = "Quality"
script_runner = "bash"
script = [
'''
cargo fmt --all -- --check
cargo clippy --locked --all-targets -- -D warnings
'''
]

[tasks.fix-lints]
description = "Apply format and clippy fixes"
category = "Quality"
script_runner = "bash"
script = [
'''
cargo fmt --all
cargo clippy --locked --all-targets --fix --allow-dirty
'''
]
