# cargo-make shortcuts for the repository scripts.

[config]
min_version = "0.37.0"
default_to_workspace = false
skip_core_tasks = true

[tasks.dev]
description = "Build the local CLI and agent rootfs"
category = "Development"
script_runner = "bash"
script = ["./scripts/build.sh"]

[tasks.smolvm]
description = "Run the local smolvm build"
category = "Development"
script_runner = "bash"
script = [
'''
IFS=';' read -ra ARGS <<< "${CARGO_MAKE_TASK_ARGS}"
exec ./scripts/run.sh "${ARGS[@]}"
'''
]

[tasks.install]
description = "Build from source and install locally"
category = "Install"
script_runner = "bash"
script = ["./scripts/install.sh"]

[tasks.uninstall]
description = "Remove the local install"
category = "Install"
script_runner = "bash"
script = ["./scripts/install.sh --uninstall"]

[tasks.agent-rootfs]
description = "Build the agent rootfs"
category = "Agent"
script_runner = "bash"
script = ["./scripts/build-agent-rootfs.sh"]

[tasks.agent-rebuild]
description = "Rebuild the agent and update rootfs artifacts"
category = "Agent"
script_runner = "bash"
script = ["./scripts/rebuild-agent.sh"]

[tasks.build-libkrunfw]
description = "Build libkrunfw and update lib/"
category = "Build"
script_runner = "bash"
script = [
'''
set -euo pipefail
ARCH=$(uname -m)
FULL_VERSION=$(grep '^FULL_VERSION' libkrunfw/Makefile | cut -d= -f2 | tr -d ' ')
KERNEL_SRC=$(grep '^KERNEL_VERSION' libkrunfw/Makefile | cut -d= -f2 | tr -d ' ')

if [ -d "libkrunfw/${KERNEL_SRC}" ]; then
  cp libkrunfw/config-libkrunfw_x86_64 "libkrunfw/${KERNEL_SRC}/.config"
  make -C "libkrunfw/${KERNEL_SRC}" olddefconfig
  rm -f libkrunfw/kernel.c
fi

make -C libkrunfw
mkdir -p "lib/linux-${ARCH}"
cp "libkrunfw/libkrunfw.so.${FULL_VERSION}" "lib/linux-${ARCH}/libkrunfw.so.${FULL_VERSION}"
cd "lib/linux-${ARCH}"
ln -sf "libkrunfw.so.${FULL_VERSION}" libkrunfw.so.5
ln -sf libkrunfw.so.5 libkrunfw.so
'''
]

[tasks.build-libkrun]
description = "Build libkrun and update lib/"
category = "Build"
script_runner = "bash"
script = [
'''
set -euo pipefail
ARCH=$(uname -m)
make -C libkrun BLK=1 GPU=1
mkdir -p "lib/linux-${ARCH}"
cp libkrun/target/release/libkrun.so "lib/linux-${ARCH}/libkrun.so"
'''
]

[tasks.test]
description = "Run all tests"
category = "Test"
script_runner = "bash"
script = ["./tests/run_all.sh"]

[tasks.test-cli]
description = "Run CLI tests"
category = "Test"
script_runner = "bash"
script = ["./tests/run_all.sh cli"]

[tasks.test-sandbox]
description = "Run sandbox tests"
category = "Test"
script_runner = "bash"
script = ["./tests/run_all.sh sandbox"]

[tasks.test-microvm]
description = "Run microVM tests"
category = "Test"
script_runner = "bash"
script = ["./tests/run_all.sh microvm"]

[tasks.test-pack]
description = "Run pack tests"
category = "Test"
script_runner = "bash"
script = ["./tests/run_all.sh pack"]

[tasks.test-lib]
description = "Run unit tests"
category = "Test"
command = "cargo"
args = ["test", "--locked", "--lib"]

[tasks.lint]
description = "Run format and clippy checks"
category = "Quality"
script_runner = "bash"
script = [
'''
cargo fmt --all -- --check
cargo clippy --locked --all-targets -- -D warnings
'''
]

[tasks.fix-lints]
description = "Apply format and clippy fixes"
category = "Quality"
script_runner = "bash"
script = [
'''
cargo fmt --all
cargo clippy --locked --all-targets --fix --allow-dirty
'''
]
